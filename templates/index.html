<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Route Finder</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="text-center my-5">
            <h1 class="display-4">Emergency Route Finder</h1>
            <p class="lead">Find the fastest route to a hospital in Jaipur during an emergency.</p>
        </header>

        <!-- Input Form -->
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="routeForm" class="card p-4 shadow">
                    <div class="mb-3">
                        <label for="accident_site" class="form-label">Accident Location in Jaipur</label>
                        <input type="text" class="form-control" id="accident_site" name="accident_site" placeholder="e.g., Tripolia Bazaar" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">Find Route</button>
                </form>
                <div id="error" class="alert alert-danger mt-3 d-none"></div>
                <div id="status" class="alert alert-info mt-3 d-none"></div>
            </div>
        </div>

        <!-- Map Display -->
        <div class="row mt-5">
            <div class="col-12">
                <div id="map-container" class="card shadow">
                    <div id="map" class="map-placeholder">
                        <p class="text-muted text-center pt-5">Enter a location to view the route map.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery for AJAX -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
